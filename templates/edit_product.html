{% extends 'base.html' %}

{% block title %}Editar Producto{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h3>✏️ Editar Producto</h3>
    <div class="card">
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input class="form-control" name="name" value="{{ product.name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Categoría</label>
            <input class="form-control" name="category" value="{{ product.category }}">
          </div>
          <div class="mb-3">
            <label class="form-label">SKU</label>
            <input class="form-control" name="sku" value="{{ product.sku or '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Precio $</label>
            <input class="form-control" name="price" value="{{ product.price }}" type="number" step="0.01" min="0">
          </div>
          <div class="mb-3">
            <label class="form-label">Stock Mínimo</label>
            <input class="form-control" name="min_stock" value="{{ product.min_stock }}" type="number" min="0">
          </div>
          <div class="alert alert-info">
            <strong>Stock actual:</strong> {{ product.stock }}
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success">Guardar cambios</button>
            <a class="btn btn-secondary" href="/products">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
